site_name: PHP Katas
site_description: Katas Challenges
site_url: https://becoming-a-senior.github.io/php-katas/
site_author: Becomingasenior.com
copyright: "© 2026 <a href='https://becomingasenior.com'>BecomingASenior.com</a>"

theme:
  name: material
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.sections
    - navigation.collapse
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  font:
    text: IBM Plex Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/language-php

nav:
  - Home: index.md
  - Data Structures:
      - Linked List: linked-list/index.md
      - Queue: queue/index.md
      - Stack: stack/index.md
  - Strings:
      - Anagram: anagram/index.md
      - FizzBuzz: fizzbuzz/index.md
      - Palindrome: palindrome/index.md
      - String Reverse: string-reverse/index.md
      - Vowels: vowels/index.md
  - Arrays:
      - Array Chunk: array-chunk/index.md
      - Group of People: group-of-people/index.md
      - Merge Intervals: merge-intervals/index.md
      - Two Sum: two-sum/index.md
  - Numbers:
      - Integers to Roman: integers-to-roman/index.md
      - Roman to Integers: roman-to-integers/index.md

plugins:
  - search
  - awesome-pages

markdown_extensions:
  - admonition
  - abbr
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Link to this section
      toc_depth: 3
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - docs
        - src
        - tests
      check_paths: false
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.mark
  - pymdownx.critic
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.smartsymbols
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/php
      link: https://www.php.net
      name: PHP Documentation

extra_css:
  - stylesheets/extra.css